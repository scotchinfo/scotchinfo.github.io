<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - scotchinfo</title>
  <link rel="stylesheet" href="dashboard-style.css">
  <link rel="stylesheet" href="login-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <!-- Login Form -->
      <div id="loginForm" class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to access the Scotch College Informatics Club dashboard</p>
        
        <div class="auth-form">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="auth-input" placeholder="Enter your email" required>
          </div>
          
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="auth-input" placeholder="Enter your password" required>
          </div>
          
          <button id="loginButton" class="auth-button">Sign In</button>
        </div>
        
        <p class="auth-switch">Don't have an account? <a href="#" id="showSignup">Create one</a></p>
        <p class="back-link"><a href="../index.html">← Back to home</a></p>
      </div>

      <!-- Signup Form (Hidden by default) -->
      <div id="signupForm" class="auth-card" style="display: none;">
        <h1>Create Account</h1>
        <p class="subtitle">Join the Informatics Club community</p>
        
        <div class="auth-form">
          <div class="form-group">
            <label for="signupUsername">Username</label>
            <input type="text" id="signupUsername" class="auth-input" placeholder="Max 15 'normal' characters" required>
          </div>
          
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" class="auth-input" placeholder="School email preferred" required>
          </div>
          
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" class="auth-input" placeholder="Minimum 6 characters" required>
          </div>
          
          <button id="signupButton" class="auth-button">Create Account</button>
        </div>
        
        <p class="auth-switch">Already have an account? <a href="#" id="showLogin">Sign in</a></p>
        <p class="back-link"><a href="../index.html">← Back to home</a></p>
      </div>

      <!-- Logged In View (Hidden by default) -->
      <div id="loggedInView" class="auth-card" style="display: none;">
        <div class="logged-in-content">
          <div class="user-avatar-large">
            <span id="userAvatarLetter">U</span>
          </div>
          <h1 id="userName">User</h1>
          <p class="user-email" id="userEmail">user@example.com</p>
          
          <div class="logged-in-actions">
            <button onclick="window.location.href='index.html'" class="primary-button">Go to Dashboard</button>
            <button id="logoutButton" class="secondary-button">Sign Out</button>
          </div>
        </div>
      </div>

      <!-- Error/Success Messages -->
      <div id="authMessage" class="auth-message" style="display: none;"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make auth available globally
    window.firebaseAuth = auth;
    
    console.log("Firebase Auth initialized!");
  </script>

  <script src="login.js"></script>
</body>
</html>
