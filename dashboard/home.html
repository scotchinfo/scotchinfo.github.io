<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home - Informatics Club</title>
  <link rel="stylesheet" href="dashboard-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <h1>Welcome back, <span id="dashboardUsername" style="cursor: pointer;">Guest</span></h1>
        <button id="dashboardAuthButton" class="auth-btn">Login</button>
      </div>
    </header>

    <!-- Navigation Bar (No active selection) -->
    <nav class="dashboard-nav">
      <a href="index.html" class="nav-item">Content</a>
      <a href="resources.html" class="nav-item">Resources</a>
      <a href="ide.html" class="nav-item">IDE</a>
      <a href="challenge.html" class="nav-item">Challenge</a>
    </nav>

    <main class="dashboard-main">
      <!-- User Profile Section -->
      <div class="profile-section">
        <div class="profile-card-large">
          <div class="profile-avatar">
            <div class="avatar-placeholder" id="userAvatar">?</div>
          </div>
          <div class="profile-info">
            <h2 id="profileName">Guest User</h2>
            <p id="profileEmail">Not logged in</p>
          </div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="userSubmissions">0</div>
          <div class="stat-label">Your Submissions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="problemsSolved">0</div>
          <div class="stat-label">Problems Solved</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="currentStreak">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
      </div>

      <!-- Quick Access -->
      <div class="quick-access-section">
        <h2 class="section-title">Quick Access</h2>
        <div class="quick-grid">
          <div class="quick-card" onclick="window.location.href='problems.html'">
            <div class="quick-icon">📝</div>
            <h3>Browse Problems</h3>
            <p>Explore weekly challenges</p>
          </div>
          <div class="quick-card" onclick="window.location.href='ide.html'">
            <div class="quick-icon">💻</div>
            <h3>Open IDE</h3>
            <p>Write and test code</p>
          </div>
          <div class="quick-card" onclick="window.location.href='resources.html'">
            <div class="quick-icon">📚</div>
            <h3>Learning Resources</h3>
            <p>Tutorials and guides</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.firebaseAuth = auth;
    window.firebaseDB = db;

    // Update dashboard UI based on auth state
    onAuthStateChanged(auth, (user) => {
      // Redirect to login if not authenticated
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const usernameEl = document.getElementById('dashboardUsername');
      const authBtn = document.getElementById('dashboardAuthButton');
      const profileName = document.getElementById('profileName');
      const profileEmail = document.getElementById('profileEmail');
      const userAvatar = document.getElementById('userAvatar');
      
      const displayName = user.displayName || 'User';
      usernameEl.textContent = displayName;
      usernameEl.style.cursor = 'pointer';
      usernameEl.onclick = () => window.location.href = 'home.html';
      authBtn.textContent = 'Logout';
      authBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = 'login.html';
      };

      // Update profile section
      profileName.textContent = displayName;
      profileEmail.textContent = user.email;
      userAvatar.textContent = displayName.charAt(0).toUpperCase();
    });
  </script>
</body>
</html>
