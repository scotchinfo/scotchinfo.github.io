<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDE - scotchinfo</title>
  <link rel="stylesheet" href="dashboard-style.css">
  <link rel="stylesheet" href="ide-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <h1>Welcome back, <span id="dashboardUsername" style="cursor: pointer;">Guest</span></h1>
        <button id="dashboardAuthButton" class="auth-btn">Login</button>
      </div>
    </header>

    <!-- Navigation Bar -->
    <nav class="dashboard-nav">
      <a href="index.html" class="nav-item">Content</a>
      <a href="resources.html" class="nav-item">Resources</a>
      <a href="ide.html" class="nav-item active">IDE</a>
    </nav>

    <main class="dashboard-main">
      <div class="ide-container">
        <h2 class="ide-title">Python IDE</h2>
        
        <div class="ide-workspace">
          <div class="editor-section">
            <div class="section-header">
              <span class="section-title">Code Editor</span>
              <button class="run-button" id="runButton"><span class="button-icon">▶</span> Run</button>
            </div>
            <textarea class="code-editor" id="codeEditor" placeholder="# Write your Python code here...
print('Hello, World!')

# Try with input:
# name = input('Enter your name: ')
# print(f'Hello, {name}!')"></textarea>
          </div>

          <div class="output-section">
            <div class="section-header">
              <span class="section-title">Input</span>
            </div>
            <textarea class="input-box" id="inputBox" placeholder="Enter input here (stdin)..."></textarea>
            
            <div class="section-header">
              <span class="section-title">Output</span>
              <button class="clear-button" id="clearButton">Clear</button>
            </div>
            <div class="output-box" id="outputBox">
              <span class="output-placeholder">Run your code to see the output here...</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Make available globally
    window.firebaseAuth = auth;
    window.firebaseDB = db;
    window.firestoreIncrement = increment;
    window.firestoreDoc = doc;
    window.firestoreSetDoc = setDoc;
    
    console.log("Firebase initialized successfully!");

    // Update dashboard UI based on auth state
    onAuthStateChanged(auth, (user) => {
      // Redirect to login if not authenticated
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const usernameEl = document.getElementById('dashboardUsername');
      const authBtn = document.getElementById('dashboardAuthButton');
      
      usernameEl.textContent = user.displayName || 'User';
      usernameEl.onclick = () => window.location.href = 'home.html';
      authBtn.textContent = 'Logout';
      authBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = 'login.html';
      };
    });
  </script>

  <script src="ide.js"></script>
</body>
</html>
