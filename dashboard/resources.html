<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resources - scotchinfo</title>
  <link rel="stylesheet" href="dashboard-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .coming-soon-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
      padding: 2rem;
    }

    .coming-soon-content {
      text-align: center;
      max-width: 600px;
    }

    .coming-soon-title {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      letter-spacing: -0.025em;
    }

    .coming-soon-text {
      font-size: 1.25rem;
      color: #6b7280;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .coming-soon-title {
        font-size: 2rem;
      }

      .coming-soon-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <h1>Welcome back, <span id="dashboardUsername" style="cursor: pointer;">Guest</span></h1>
        <button id="dashboardAuthButton" class="auth-btn">Login</button>
      </div>
    </header>

    <!-- Navigation Bar -->
    <nav class="dashboard-nav">
      <a href="index.html" class="nav-item">Content</a>
      <a href="resources.html" class="nav-item active">Resources</a>
      <a href="ide.html" class="nav-item">IDE</a>
    </nav>

    <main class="dashboard-main">
      <div class="coming-soon-container">
        <div class="coming-soon-content">
          <h1 class="coming-soon-title">Coming Soon</h1>
          <p class="coming-soon-text">Learning resources and tutorials are currently being prepared.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.firebaseAuth = auth;
    window.firebaseDB = db;

    // Update dashboard UI based on auth state
    onAuthStateChanged(auth, (user) => {
      // Redirect to login if not authenticated
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const usernameEl = document.getElementById('dashboardUsername');
      const authBtn = document.getElementById('dashboardAuthButton');
      
      usernameEl.textContent = user.displayName || 'User';
      usernameEl.style.cursor = 'pointer';
      usernameEl.onclick = () => window.location.href = 'home.html';
      authBtn.textContent = 'Logout';
      authBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = 'login.html';
      };
    });
  </script>
</body>
</html>
