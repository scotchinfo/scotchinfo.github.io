<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph Visualiser - scotchinfo</title>
  <link rel="stylesheet" href="dashboard-style.css">
  <link rel="stylesheet" href="visualiser-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="../files/scotch.jpg">
</head>

<body>
  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <div class="header-content">
        <h1><span id="dashboardGreetingPrefix">Welcome back, </span><span id="dashboardUsername" style="cursor: pointer;">Guest</span></h1>
        <button id="dashboardAuthButton" class="auth-btn">Login</button>
      </div>
    </header>

    <!-- Navigation Bar -->
    <nav class="dashboard-nav">
      <a href="index.html" class="nav-item">Content</a>
      <a href="resources.html" class="nav-item">Resources</a>
      <a href="ide.html" class="nav-item">IDE</a>
      <a href="visualiser.html" class="nav-item active">Visualiser</a>
    </nav>

    <main class="dashboard-main">
      <div class="visualiser-container">
        <!-- Input Panel -->
        <div class="vis-input-panel">
          <h2>Graph Input</h2>

          <div class="vis-format-hint">
            <strong>Format:</strong><br>
            Line 1: <code>N</code> (number of nodes)<br>
            Lines 2+: <code>u v</code> or <code>u v w</code> (if <code>w</code> is provided, it will be shown as the edge weight)
          </div>

          <div class="vis-input-group">
            <label for="graphInput">Edges</label>
            <textarea id="graphInput" placeholder="5
1 2
2 3
3 4
4 5
5 1
1 3"></textarea>
          </div>

          <div class="vis-controls">
            <label class="vis-toggle">
              <input type="checkbox" id="directedToggle">
              <span class="toggle-track"></span>
              <span class="toggle-label">Directed</span>
            </label>
          </div>

          <button class="vis-draw-btn" id="drawBtn">▶ Draw Graph</button>
          <button class="vis-clear-btn" id="clearBtn">Clear</button>

          <div class="vis-error" id="errorBox"></div>
        </div>

        <!-- Canvas Panel -->
        <div class="vis-canvas-panel">
          <canvas id="graphCanvas"></canvas>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.firebaseAuth = auth;
    window.firebaseDB = db;

    // Update dashboard UI based on auth state
    onAuthStateChanged(auth, (user) => {
      const greetingPrefixEl = document.getElementById('dashboardGreetingPrefix');
      const usernameEl = document.getElementById('dashboardUsername');
      const authBtn = document.getElementById('dashboardAuthButton');

      if (!user) {
        if (greetingPrefixEl) greetingPrefixEl.textContent = '';
        usernameEl.textContent = 'Guest Preview';
        usernameEl.style.cursor = 'default';
        usernameEl.onclick = null;
        authBtn.textContent = 'Login';
        authBtn.onclick = () => {
          window.location.href = 'login.html';
        };
        return;
      }

      if (greetingPrefixEl) greetingPrefixEl.textContent = 'Welcome back, ';

      usernameEl.textContent = user.displayName || 'User';
      usernameEl.style.cursor = 'pointer';
      usernameEl.onclick = () => window.location.href = 'home.html';
      authBtn.textContent = 'Logout';
      authBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = 'login.html';
      };
    });
  </script>

  <script src="visualiser.js"></script>
</body>

</html>
