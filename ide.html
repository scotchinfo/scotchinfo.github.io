<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDE - Informatics Club</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</head>
<body class="no-matrix">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-link">Home</a>
      <a href="committee.html" class="nav-link">Committee</a>
      <a href="ide.html" class="nav-link active">IDE</a>
      <a href="login.html" class="nav-link login-link">Login</a>
    </div>
  </nav>

  <div class="ide-container">
    <h1>Scotch College IDE</h1>
    
    <div class="ide-workspace">
      <div class="editor-section">
        <div class="section-header">
          <span class="section-title">Code Editor</span>
          <button class="run-button" id="runButton"><span class="button-icon">▶</span> Run</button>
        </div>
        <textarea class="code-editor" id="codeEditor" placeholder="# Write your Python code here...
print('Hello, World!')

# Try with input:
# name = input('Enter your name: ')
# print(f'Hello, {name}!')"></textarea>
      </div>

      <div class="output-section">
        <div class="section-header">
          <span class="section-title">Input</span>
        </div>
        <textarea class="input-box" id="inputBox" placeholder="Enter input here (stdin)..."></textarea>
        
        <div class="section-header">
          <span class="section-title">Output</span>
          <button class="clear-button" id="clearButton">Clear</button>
        </div>
        <div class="output-box" id="outputBox">
          <span class="output-placeholder">Run your code to see the output here...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Make db and increment available globally
    window.firebaseDB = db;
    window.firestoreIncrement = increment;
    window.firestoreDoc = doc;
    window.firestoreSetDoc = setDoc;
    
    console.log("Firebase initialized successfully!");
  </script>

  <script src="ide.js"></script>
  <script src="auth-navbar.js"></script>
</body>
</html>
