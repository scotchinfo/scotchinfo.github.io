<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Informatics Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="no-matrix">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-link">Home</a>
      <a href="committee.html" class="nav-link">Committee</a>
      <a href="ide.html" class="nav-link">IDE</a>
      <a href="login.html" class="nav-link login-link active">Login</a>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-box">
      <h1>Welcome Back</h1>
      
      <!-- Login Form -->
      <div id="loginForm" class="auth-form-wrapper">
        <div class="auth-form">
          <input type="email" id="loginEmail" class="auth-input" placeholder="Email" required>
          <input type="password" id="loginPassword" class="auth-input" placeholder="Password" required>
          <button id="loginButton" class="auth-button">Login</button>
        </div>
        <p class="auth-switch">Don't have an account? <a href="#" id="showSignup">Sign up</a></p>
      </div>

      <!-- Signup Form (Hidden by default) -->
      <div id="signupForm" class="auth-form-wrapper" style="display: none;">
        <div class="auth-form">
          <input type="text" id="signupUsername" class="auth-input" placeholder="Username" required>
          <input type="email" id="signupEmail" class="auth-input" placeholder="Email (school email preferred)" required>
          <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)" required>
          <button id="signupButton" class="auth-button">Sign Up</button>
        </div>
        <p class="auth-switch">Already have an account? <a href="#" id="showLogin">Login</a></p>
      </div>

      <!-- Logged In View (Hidden by default) -->
      <div id="loggedInView" class="auth-form-wrapper" style="display: none;">
        <div class="user-info">
          <div class="username-display">
            <span id="userName"></span>
          </div>
          <p class="user-email" id="userEmail"></p>
        </div>
        <button id="logoutButton" class="auth-button logout-button">Logout</button>
      </div>

      <!-- Error/Success Messages -->
      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQqNwN2thrYfR9LsOYr9p_-GHJ7Qr8NU0",
      authDomain: "scotch-informatics-club.firebaseapp.com",
      projectId: "scotch-informatics-club",
      storageBucket: "scotch-informatics-club.firebasestorage.app",
      messagingSenderId: "925756955037",
      appId: "1:925756955037:web:df9ca311b0e488f0f57774",
      measurementId: "G-LM0XYTWGJ3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make auth available globally
    window.firebaseAuth = auth;
    
    console.log("Firebase Auth initialized!");
  </script>

  <script src="login.js"></script>
  <script src="auth-navbar.js"></script>
</body>
</html>
